# PXE assets, agent installers, and the local apt mirror.
server {
    listen 80;
    server_name _;

    root /srv/http;
    autoindex on;

    # Big ISOs stream from here — no buffering limits.
    location / {
        try_files $uri $uri/ =404;
    }

    # Agent source + installers (mounted from ./agent).
    location /agent-src/ {
        alias /srv/http/agent-src/;
    }

    # Local apt mirror (offline repository for managed hosts).
    location /repo/ {
        alias /srv/repo/;
        autoindex on;
    }
}

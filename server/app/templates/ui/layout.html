<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}Landscape{% endblock %}</title>
<style>
/* ---------- design tokens ---------- */
:root{
  --bg:#f4f5fa; --panel:#ffffff; --panel-2:#f8f9fd;
  --ink:#171923; --mut:#697086; --line:#e5e8f0;
  --acc:#6d28d9; --acc-2:#8b5cf6; --acc-soft:#ede9fe;
  --ok:#0f8a43; --ok-bg:#e2f6ea; --warn:#b45309; --warn-bg:#fdf0d9;
  --bad:#c22030; --bad-bg:#fde5e7;
  --shadow:0 1px 2px rgba(23,25,35,.05),0 4px 16px -8px rgba(23,25,35,.08);
  --shadow-lg:0 4px 24px -6px rgba(23,25,35,.14);
  --code-bg:#171a23; --code-ink:#dfe3ee;
  --side-bg:linear-gradient(180deg,#181026 0%,#120c1d 100%);
  --side-ink:#b9b1cc; --side-hi:#ffffff; --side-line:rgba(255,255,255,.07);
  --r:12px;
}
html[data-theme="dark"]{
  --bg:#0e1016; --panel:#161923; --panel-2:#1b1f2c;
  --ink:#e7e9f1; --mut:#8d95ab; --line:#252a3a;
  --acc:#a78bfa; --acc-2:#8b5cf6; --acc-soft:#2b2350;
  --ok:#4ade80; --ok-bg:#122a1c; --warn:#fbbf24; --warn-bg:#2d2311;
  --bad:#f87171; --bad-bg:#331418;
  --shadow:0 1px 2px rgba(0,0,0,.4),0 6px 20px -10px rgba(0,0,0,.5);
  --shadow-lg:0 8px 30px -8px rgba(0,0,0,.6);
  --code-bg:#0b0d13; --code-ink:#c9cfdd;
}
/* ---------- base ---------- */
*{box-sizing:border-box}
html{height:100%}
body{margin:0;min-height:100%;display:flex;background:var(--bg);color:var(--ink);
  font:14px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  -webkit-font-smoothing:antialiased;transition:background .2s}
a{color:var(--acc);text-decoration:none}
a:hover{text-decoration:underline}
h1{font-size:21px;font-weight:700;letter-spacing:-.02em;margin:0 0 18px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
h2{font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--mut);margin:26px 0 10px}
.panel>h2:first-child,.panel h2[style]{margin-top:0}
/* ---------- sidebar ---------- */
aside{width:224px;flex-shrink:0;background:var(--side-bg);display:flex;flex-direction:column;
  position:sticky;top:0;height:100vh}
.brand{display:flex;align-items:center;gap:10px;padding:20px 18px 16px;color:var(--side-hi);
  font-size:16px;font-weight:700;letter-spacing:-.01em}
.brand .logo{width:30px;height:30px;border-radius:9px;flex-shrink:0;
  background:linear-gradient(135deg,#8b5cf6,#d946ef);display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 12px -2px rgba(139,92,246,.5)}
.brand .logo svg{width:17px;height:17px;stroke:#fff}
nav{padding:6px 10px;display:flex;flex-direction:column;gap:2px;overflow-y:auto}
nav a{display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:9px;
  color:var(--side-ink);font-weight:500;font-size:13.5px;transition:background .12s,color .12s}
nav a:hover{background:rgba(255,255,255,.06);color:var(--side-hi);text-decoration:none}
nav a.on{background:linear-gradient(90deg,rgba(139,92,246,.28),rgba(139,92,246,.10));
  color:var(--side-hi);box-shadow:inset 3px 0 0 var(--acc-2)}
nav a svg{width:17px;height:17px;stroke:currentColor;flex-shrink:0;opacity:.85}
.side-foot{margin-top:auto;padding:14px 16px;border-top:1px solid var(--side-line);
  display:flex;align-items:center;gap:10px;color:var(--side-ink);font-size:12.5px}
.avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#8b5cf6,#6d28d9);
  color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0}
.side-foot .who{line-height:1.25;min-width:0}
.side-foot .who b{color:var(--side-hi);display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.side-foot a{color:var(--side-ink)}
.side-foot a:hover{color:var(--side-hi)}
.theme-btn{margin-left:auto;background:rgba(255,255,255,.07);border:none;color:var(--side-ink);
  width:30px;height:30px;border-radius:8px;cursor:pointer;font-size:14px;line-height:1}
.theme-btn:hover{background:rgba(255,255,255,.14);color:#fff}
/* ---------- content ---------- */
main{flex:1;padding:28px 34px 60px;max-width:1240px;min-width:0}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);
  padding:18px 20px;margin-bottom:18px;box-shadow:var(--shadow)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
/* stat cards */
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(158px,1fr));gap:14px;margin-bottom:20px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);
  padding:16px 18px;box-shadow:var(--shadow);position:relative;overflow:hidden;transition:transform .12s,box-shadow .12s}
.card:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg)}
.card::before{content:"";position:absolute;inset:0 auto 0 0;width:4px;
  background:linear-gradient(180deg,var(--acc-2),var(--acc))}
.card .n{font-size:26px;font-weight:800;letter-spacing:-.03em}
.card .l{font-size:11.5px;font-weight:600;color:var(--mut);text-transform:uppercase;letter-spacing:.06em;margin-top:2px}
/* tables */
table{width:100%;border-collapse:collapse;font-size:13.5px}
th{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--mut);
  text-align:left;padding:8px 10px;border-bottom:1px solid var(--line);background:var(--panel-2)}
th:first-child{border-radius:8px 0 0 8px}th:last-child{border-radius:0 8px 8px 0}
td{padding:9px 10px;border-bottom:1px solid var(--line);vertical-align:top}
tr:last-child td{border-bottom:none}
tbody tr:hover td,table tr:hover td{background:var(--panel-2)}
/* pills */
.pill{display:inline-flex;align-items:center;gap:5px;padding:2px 9px;border-radius:999px;
  font-size:11px;font-weight:600;letter-spacing:.01em;white-space:nowrap}
.pill::before{content:"";width:6px;height:6px;border-radius:50%;background:currentColor}
.pill.ok{background:var(--ok-bg);color:var(--ok)}
.pill.bad{background:var(--bad-bg);color:var(--bad)}
.pill.warn{background:var(--warn-bg);color:var(--warn)}
.pill.mut{background:var(--panel-2);color:var(--mut);border:1px solid var(--line)}
/* forms */
label{font-size:12.5px;font-weight:500;color:var(--mut);display:inline-flex;flex-direction:column;gap:4px}
label:has(input[type=checkbox]){flex-direction:row;align-items:center;gap:8px;color:var(--ink)}
input,select,textarea{font:inherit;font-size:13.5px;padding:7px 10px;border:1px solid var(--line);
  border-radius:9px;background:var(--panel);color:var(--ink);transition:border .12s,box-shadow .12s}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--acc-2);
  box-shadow:0 0 0 3px color-mix(in srgb,var(--acc-2) 22%,transparent)}
input[type=checkbox]{width:16px;height:16px;accent-color:var(--acc);padding:0}
textarea{width:100%;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:12.5px;line-height:1.5}
::placeholder{color:var(--mut);opacity:.7}
button{font:inherit;font-size:13.5px;font-weight:600;padding:7px 16px;border:none;border-radius:9px;
  background:linear-gradient(135deg,var(--acc-2),var(--acc));color:#fff;cursor:pointer;
  box-shadow:0 2px 8px -2px color-mix(in srgb,var(--acc) 55%,transparent);transition:filter .12s,transform .12s}
button:hover{filter:brightness(1.08)}
button:active{transform:translateY(1px)}
button:disabled{opacity:.5;cursor:not-allowed}
button.ghost{background:transparent;color:var(--acc);border:1px solid color-mix(in srgb,var(--acc) 45%,transparent);box-shadow:none}
button.ghost:hover{background:var(--acc-soft)}
button.danger{background:linear-gradient(135deg,#ef4444,#b91c1c);box-shadow:0 2px 8px -2px rgba(185,28,28,.4)}
form.inline{display:inline}
.row{display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap;margin:10px 0}
.row button{margin-bottom:1px}
/* code */
pre{background:var(--code-bg);color:var(--code-ink);padding:14px 16px;border-radius:10px;
  border:1px solid var(--line);overflow-x:auto;font:12px/1.6 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
  max-height:460px;overflow-y:auto}
code{background:var(--acc-soft);color:var(--acc);padding:1px 6px;border-radius:5px;
  font:12px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
pre code{background:none;color:inherit;padding:0}
details summary{cursor:pointer;padding:6px 0;font-weight:500}
details summary:hover{color:var(--acc)}
.mut{color:var(--mut)}.small{font-size:12.5px}
/* responsive */
@media(max-width:920px){
  body{flex-direction:column}
  aside{width:100%;height:auto;position:static;flex-direction:row;align-items:center;flex-wrap:wrap}
  .brand{padding:12px 14px}
  nav{flex-direction:row;flex-wrap:wrap;padding:6px}
  nav a{padding:7px 10px}
  .side-foot{margin:0 8px 0 auto;border:none;padding:8px}
  main{padding:18px 16px 40px}
  .grid2{grid-template-columns:1fr}
}
</style>
<script>
(function(){
  var t = localStorage.getItem('theme') ||
          (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
  document.documentElement.setAttribute('data-theme', t);
})();
</script>
</head>
<body>
<aside>
  <div class="brand">
    <span class="logo"><svg viewBox="0 0 24 24" fill="none" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 17l4-7 4 5 3-4 7 6"/><circle cx="17" cy="6" r="2.4"/></svg></span>
    Landscape
  </div>
  <nav>
    <a href="/" class="{{ 'on' if active=='dashboard' }}"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="7" height="9" rx="1.5"/><rect x="14" y="3" width="7" height="5" rx="1.5"/><rect x="14" y="12" width="7" height="9" rx="1.5"/><rect x="3" y="16" width="7" height="5" rx="1.5"/></svg>Dashboard</a>
    <a href="/hosts" class="{{ 'on' if active=='hosts' }}"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><rect x="2.5" y="4" width="19" height="12" rx="2"/><path d="M8 20h8M12 16v4"/></svg>Hosts</a>
    <a href="/software" class="{{ 'on' if active=='software' }}"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 8l-9-4.5L3 8v8l9 4.5L21 16z"/><path d="M3 8l9 4.5L21 8M12 12.5V21"/><path d="M16.5 5.75l-9 4.5"/></svg>Software</a>
    <a href="/tasks" class="{{ 'on' if active=='tasks' }}"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6h12M9 12h12M9 18h12"/><path d="M3.5 6l1 1 2-2M3.5 12l1 1 2-2M3.5 18l1 1 2-2"/></svg>Tasks</a>
    <a href="/compliance" class="{{ 'on' if active=='compliance' }}"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l7 3v5c0 4.5-3 8.5-7 10-4-1.5-7-5.5-7-10V6z"/><path d="M9 12l2 2 4-4"/></svg>Compliance</a>
    <a href="/repos" class="{{ 'on' if active=='repos' }}"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><ellipse cx="12" cy="5.5" rx="8" ry="3"/><path d="M4 5.5V12c0 1.7 3.6 3 8 3s8-1.3 8-3V5.5"/><path d="M4 12v6.5c0 1.7 3.6 3 8 3s8-1.3 8-3V12"/></svg>Repositories</a>
    <a href="/provision" class="{{ 'on' if active=='provision' }}"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 8l-9-5-9 5 9 5 9-5z"/><path d="M3 8v8l9 5 9-5V8"/><path d="M12 13v8"/></svg>Provisioning</a>
    <a href="/pxe" class="{{ 'on' if active=='pxe' }}"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><path d="M5 12.5a10 10 0 0 1 14 0M8 15.5a6 6 0 0 1 8 0"/><circle cx="12" cy="19" r="1.6"/><path d="M2 9.5a14.5 14.5 0 0 1 20 0"/></svg>PXE / DHCP</a>
    {% if user.role == 'admin' %}
    <a href="/settings" class="{{ 'on' if active=='settings' }}"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3.2"/><path d="M19 12a7 7 0 0 0-.1-1.2l2-1.5-2-3.4-2.3 1a7 7 0 0 0-2-1.2L14.2 3h-4l-.4 2.5a7 7 0 0 0-2 1.2l-2.3-1-2 3.4 2 1.5a7.2 7.2 0 0 0 0 2.4l-2 1.5 2 3.4 2.3-1a7 7 0 0 0 2 1.2l.4 2.5h4l.4-2.5a7 7 0 0 0 2-1.2l2.3 1 2-3.4-2-1.5c.06-.4.1-.8.1-1.2z"/></svg>Settings</a>
    {% endif %}
  </nav>
  <div class="side-foot">
    <span class="avatar">{{ user.username[:1] | upper }}</span>
    <span class="who"><b>{{ user.username }}</b>{{ user.role }} · <a href="/logout">logout</a></span>
    <button class="theme-btn" id="themeToggle" title="Toggle dark mode">◐</button>
  </div>
</aside>
<main>
{% block content %}{% endblock %}
</main>
<script>
document.getElementById('themeToggle').onclick = function () {
  var el = document.documentElement;
  var next = el.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  el.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
};
</script>
</body>
</html>

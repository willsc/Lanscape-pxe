<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Landscape — sign in</title>
<style>
*{box-sizing:border-box}
body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;
  font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background:#0e0a18;position:relative;overflow:hidden}
body::before,body::after{content:"";position:absolute;border-radius:50%;filter:blur(90px);opacity:.55}
body::before{width:520px;height:520px;background:#6d28d9;top:-160px;left:-120px}
body::after{width:460px;height:460px;background:#d946ef;bottom:-180px;right:-100px;opacity:.35}
.box{position:relative;z-index:1;width:360px;padding:38px 40px;border-radius:18px;
  background:rgba(23,18,36,.78);border:1px solid rgba(255,255,255,.09);
  backdrop-filter:blur(14px);box-shadow:0 24px 70px -20px rgba(0,0,0,.7)}
.brand{display:flex;align-items:center;gap:12px;margin-bottom:26px}
.logo{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,#8b5cf6,#d946ef);box-shadow:0 6px 18px -4px rgba(139,92,246,.6)}
.logo svg{width:20px;height:20px;stroke:#fff}
.brand b{color:#fff;font-size:19px;letter-spacing:-.02em}
.brand span{display:block;color:#8d84a6;font-size:12px;font-weight:400}
input{width:100%;padding:11px 13px;margin-bottom:12px;border-radius:10px;font:inherit;
  border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.06);color:#fff;transition:border .12s,box-shadow .12s}
input::placeholder{color:#7d7494}
input:focus{outline:none;border-color:#8b5cf6;box-shadow:0 0 0 3px rgba(139,92,246,.25)}
button{width:100%;padding:11px;border:none;border-radius:10px;font:inherit;font-weight:600;cursor:pointer;
  background:linear-gradient(135deg,#8b5cf6,#6d28d9);color:#fff;box-shadow:0 6px 16px -6px rgba(139,92,246,.7)}
button:hover{filter:brightness(1.1)}
.sso{margin-top:14px}
.sso a{display:block;text-align:center;padding:10px;border-radius:10px;color:#c4b8e8;text-decoration:none;
  border:1px solid rgba(139,92,246,.45)}
.sso a:hover{background:rgba(139,92,246,.14);color:#fff}
.err{background:rgba(239,68,68,.16);border:1px solid rgba(239,68,68,.4);color:#fca5a5;
  padding:9px 12px;border-radius:10px;margin-bottom:14px;font-size:13px}
.foot{margin-top:22px;text-align:center;color:#6b6284;font-size:11.5px}
</style>
</head>
<body>
<div class="box">
  <div class="brand">
    <span class="logo"><svg viewBox="0 0 24 24" fill="none" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 17l4-7 4 5 3-4 7 6"/><circle cx="17" cy="6" r="2.4"/></svg></span>
    <div><b>Landscape</b><span>fleet management &amp; provisioning</span></div>
  </div>
  {% if error %}<div class="err">{% if error == 'sso' %}SSO sign-in failed — check the IdP configuration.{% else %}Invalid username or password.{% endif %}</div>{% endif %}
  <form method="post" action="/login">
    <input name="username" placeholder="Username" autofocus required autocomplete="username">
    <input name="password" type="password" placeholder="Password" required autocomplete="current-password">
    <button>Sign in</button>
  </form>
  {% if sso %}<div class="sso"><a href="/oidc/login">Sign in with SSO</a></div>{% endif %}
  <div class="foot">self-hosted · works offline</div>
</div>
</body>
</html>
